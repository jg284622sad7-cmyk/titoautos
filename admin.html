<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Admin Panel | Tito Autos (RTDB Version)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold-primary: #D4AF37; --bg-dark: #050505; --panel-bg: #111111; }
        body { background-color: var(--bg-dark); color: #ffffff; font-family: 'Montserrat', sans-serif; background-image: radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        .font-serif-luxury { font-family: 'Cinzel', serif; }
        .text-gradient-gold { background: linear-gradient(to bottom right, #FFE066, #D4AF37, #B8860B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .admin-box { background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3); border-top: 3px solid var(--gold-primary); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .tm-input { width: 100%; background: #000; border: 1px solid rgba(255,255,255,0.1); border-bottom: 2px solid rgba(212, 175, 55, 0.5); color: white; padding: 12px 16px; font-size: 0.85rem; transition: all 0.3s ease; }
        .tm-input:focus { outline: none; border-bottom-color: var(--gold-primary); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1); background: rgba(212, 175, 55, 0.02); }
        .btn-gold-solid { background: linear-gradient(to right, #B8860B, #D4AF37); color: #000; transition: all 0.3s ease; }
        .btn-gold-solid:hover { box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); transform: translateY(-2px); }
        .btn-danger { background: rgba(220, 38, 38, 0.1); border: 1px solid #dc2626; color: #ef4444; transition: all 0.3s ease; }
        .btn-danger:hover { background: #dc2626; color: white; box-shadow: 0 0 15px rgba(220, 38, 38, 0.5); }
        .btn-edit { background: rgba(59, 130, 246, 0.1); border: 1px solid #3b82f6; color: #60a5fa; transition: all 0.3s ease; }
        .btn-edit:hover { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        input[type="file"]::file-selector-button { background: linear-gradient(to right, #B8860B, #D4AF37); color: #000; border: none; padding: 8px 16px; font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: bold; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; margin-right: 15px; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col pb-20 md:pb-0">

    <nav class="w-full bg-black border-b border-[#D4AF37]/30 py-4 px-6 md:px-8 flex justify-between items-center z-50 shadow-lg">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-shield-halved text-[#D4AF37] text-xl md:text-2xl"></i>
            <span class="font-serif-luxury text-lg md:text-xl tracking-[0.2em] text-gradient-gold font-bold">TM ADMIN (RTDB)</span>
        </div>
        <div class="hidden md:flex items-center gap-6">
            <a href="index.html" class="text-[10px] tracking-[0.1em] text-gray-400 hover:text-white transition-colors uppercase font-semibold">
                <i class="fa-solid fa-arrow-left mr-2"></i>Volver a la Web
            </a>
            <div class="text-[10px] text-[#D4AF37] tracking-widest border border-[#D4AF37] px-4 py-1 rounded-sm bg-[#D4AF37]/10">
                JEFE SANTI conectado
            </div>
        </div>
    </nav>

    <div class="flex-grow p-4 md:p-8 max-w-[1600px] mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1">
            <div class="admin-box p-6 rounded-sm sticky top-24">
                <h2 class="font-serif-luxury text-xl text-gradient-gold mb-6 tracking-widest uppercase border-b border-white/10 pb-4" id="form-title">
                    <i class="fa-solid fa-plus mr-2"></i>Publicar Vehículo
                </h2>
                
                <form id="car-form" class="space-y-4">
                    <input type="hidden" id="car-id">
                    
                    <div>
                        <label class="block text-[11px] md:text-[10px] uppercase tracking-widest text-gray-400 mb-1">Nombre del Vehículo</label>
                        <input type="text" id="car-name" class="tm-input" placeholder="Ej: Lamborghini Huracán" required>
                    </div>

                    <div>
                        <label class="block text-[11px] md:text-[10px] uppercase tracking-widest text-gray-400 mb-1">Precio (USD)</label>
                        <input type="text" id="car-price" class="tm-input" placeholder="Ej: 3,500,000" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] md:text-[10px] uppercase tracking-widest text-gray-400 mb-1">Año</label>
                            <input type="text" id="car-year" class="tm-input" placeholder="Ej: 2024" required>
                        </div>
                        <div>
                            <label class="block text-[11px] md:text-[10px] uppercase tracking-widest text-gray-400 mb-1">Millas/Kms</label>
                            <input type="text" id="car-mileage" class="tm-input" placeholder="Ej: Brand New" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] md:text-[10px] uppercase tracking-widest text-gray-400 mb-1">Galería (Añadir Fotos)</label>
                        <input type="file" id="car-image-file" accept="image/*" multiple class="tm-input cursor-pointer !p-2 text-gray-400">
                        <div id="image-preview" class="mt-3 hidden grid grid-cols-3 gap-2 bg-black/50 border border-[#D4AF37]/30 p-2 rounded-sm max-h-48 overflow-y-auto"></div>
                    </div>

                    <div>
                        <label class="block text-[11px] md:text-[10px] uppercase tracking-widest text-gray-400 mb-1">Descripción corta</label>
                        <textarea id="car-desc" class="tm-input h-24 resize-none" placeholder="Detalles exclusivos..."></textarea>
                    </div>

                    <button type="submit" id="btn-submit" class="w-full btn-gold-solid py-4 md:py-3 text-xs md:text-[11px] font-bold tracking-[0.2em] uppercase rounded-sm mt-4">Guardar Vehículo</button>
                    <button type="button" id="btn-cancel" class="w-full bg-transparent border border-gray-600 text-gray-400 py-4 md:py-3 text-xs md:text-[11px] font-bold tracking-[0.2em] uppercase rounded-sm mt-2 hover:bg-gray-800 hidden">Cancelar Edición</button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="admin-box p-6 rounded-sm min-h-[600px]">
                <div class="flex justify-between items-center border-b border-white/10 pb-4 mb-6">
                    <h2 class="font-serif-luxury text-lg md:text-xl text-white tracking-widest uppercase"><i class="fa-solid fa-database mr-2 text-[#D4AF37]"></i>Inventario RTDB</h2>
                    <span id="total-cars" class="text-[10px] bg-white/10 px-3 py-1 rounded text-[#D4AF37] tracking-widest font-bold">0 VEHÍCULOS</span>
                </div>
                <div id="admin-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE (REALTIME DATABASE INCLUIDA)
        const firebaseConfig = {
            apiKey: "AIzaSyBKVeFj-lNRMMk_BmtKne927K7ID2itPxs",
            authDomain: "titoautos-b6ad8.firebaseapp.com",
            databaseURL: "https://titoautos-b6ad8-default-rtdb.firebaseio.com", // Tu URL de RTDB
            projectId: "titoautos-b6ad8",
            storageBucket: "titoautos-b6ad8.firebasestorage.app",
            messagingSenderId: "97866292185",
            appId: "1:97866292185:web:cf738daf745388df7fd7c8"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database(); // Usamos Realtime Database

        document.addEventListener("DOMContentLoaded", () => {
            const TMSecurity = {
                sanitize: function(input) {
                    if(!input) return '';
                    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;', "/": '&#x2F;' };
                    const reg = /[&<>"'/]/ig;
                    return input.toString().replace(reg, (match)=>(map[match]));
                },
                generateId: function() { return 'tm_' + Math.random().toString(36).substr(2, 9); }
            };

            const form = document.getElementById('car-form');
            const grid = document.getElementById('admin-grid');
            const totalSpan = document.getElementById('total-cars');
            const btnCancel = document.getElementById('btn-cancel');
            const formTitle = document.getElementById('form-title');
            const btnSubmit = document.getElementById('btn-submit');
            const imageFileInput = document.getElementById('car-image-file');
            const previewContainer = document.getElementById('image-preview');
            
            let uploadedImagesArray = [];
            let cars = [];

            // SINCRONIZACIÓN CON REALTIME DATABASE
            database.ref("inventory").on("value", (snapshot) => {
                cars = [];
                snapshot.forEach((childSnapshot) => {
                    cars.push(childSnapshot.val());
                });
                renderCars();
            });

            window.renderPreviews = () => {
                previewContainer.innerHTML = '';
                if(uploadedImagesArray.length === 0) {
                    previewContainer.classList.add('hidden');
                    return;
                }
                previewContainer.classList.remove('hidden');
                
                uploadedImagesArray.forEach((imgSrc, idx) => {
                    const thumbDiv = document.createElement('div');
                    thumbDiv.className = 'h-20 w-full border border-[#D4AF37]/50 relative group rounded-sm overflow-hidden';
                    thumbDiv.innerHTML = `
                        <img src="${imgSrc}" class="w-full h-full object-cover">
                        <button type="button" onclick="removeImage(${idx})" class="absolute top-1 right-1 bg-red-600/90 text-white w-5 h-5 rounded-sm flex items-center justify-center text-[10px] opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity border border-white/20 hover:bg-red-500">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    `;
                    previewContainer.appendChild(thumbDiv);
                });
            };

            window.removeImage = (index) => {
                uploadedImagesArray.splice(index, 1);
                renderPreviews();
                imageFileInput.value = ''; 
            };

            // COMPRESIÓN AGRESIVA PARA SOPORTAR MUCHAS FOTOS EN RTDB
            imageFileInput.addEventListener('change', async function(e) {
                const files = Array.from(e.target.files);
                if(files.length === 0) return;

                btnSubmit.innerText = "Comprimiendo Fotos Turbo...";
                btnSubmit.disabled = true;

                // Procesamos las fotos en paralelo (muy rápido)
                const compressionPromises = files.map(file => {
                    return new Promise((resolve) => {
                        if(!file.type.startsWith('image/')) resolve(null);
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            const img = new Image();
                            img.src = event.target.result;
                            img.onload = function() {
                                const canvas = document.createElement('canvas');
                                const MAX_WIDTH = 600; // Resolución bajada para que pesen poco
                                const scaleSize = MAX_WIDTH / img.width;
                                canvas.width = MAX_WIDTH;
                                canvas.height = img.height * scaleSize;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                
                                // Calidad al 50% para que el string Base64 sea ligero
                                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);
                                resolve(compressedBase64);
                            }
                        };
                        reader.readAsDataURL(file);
                    });
                });

                const compressedImages = await Promise.all(compressionPromises);
                
                compressedImages.forEach(img => {
                    if(img) uploadedImagesArray.push(img);
                });

                renderPreviews();
                imageFileInput.value = ''; 
                btnSubmit.innerText = "Guardar Vehículo";
                btnSubmit.disabled = false;
            });

            const renderCars = () => {
                grid.innerHTML = '';
                totalSpan.innerText = `${cars.length} VEHÍCULOS`;

                cars.forEach(car => {
                    const mainImg = (car.images && car.images.length > 0) ? car.images[0] : '';
                    const galleryCount = car.images ? car.images.length : 0;
                    const card = document.createElement('div');
                    card.className = 'bg-[#0a0a0a] border border-white/10 rounded-sm overflow-hidden flex flex-col transition-all hover:border-[#D4AF37]/50';
                    card.innerHTML = `
                        <div class="h-40 w-full bg-black relative">
                            <img src="${mainImg}" alt="Auto" class="w-full h-full object-cover opacity-80">
                            <div class="absolute bottom-2 left-2 bg-black/80 px-2 py-1 text-[9px] text-white border border-white/20 flex items-center gap-1">
                                <i class="fa-solid fa-images text-[#D4AF37]"></i> ${galleryCount}
                            </div>
                        </div>
                        <div class="p-4 flex-grow flex flex-col">
                            <h3 class="font-serif-luxury text-sm text-white mb-1 truncate">${car.name}</h3>
                            <p class="text-[#D4AF37] font-bold text-sm mb-3">$${car.price}</p>
                            <div class="flex gap-2 border-t border-white/10 pt-3 mt-auto">
                                <button onclick="editCar('${car.id}')" class="btn-edit flex-1 py-3 md:py-2 text-[10px] md:text-[9px] font-bold tracking-widest uppercase rounded-sm"><i class="fa-solid fa-pen mr-1"></i> Editar</button>
                                <button onclick="deleteCar('${car.id}')" class="btn-danger flex-1 py-3 md:py-2 text-[10px] md:text-[9px] font-bold tracking-widest uppercase rounded-sm"><i class="fa-solid fa-trash mr-1"></i> Eliminar</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            };

            // GUARDAR TODO DIRECTO A LA REALTIME DATABASE
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                if(uploadedImagesArray.length === 0) {
                    alert("Por favor añade al menos una imagen a la galería.");
                    return;
                }

                btnSubmit.innerText = "Guardando directo en la base de datos...";
                btnSubmit.disabled = true;

                const id = document.getElementById('car-id').value;
                const newCarId = id ? id : TMSecurity.generateId();
                
                const newCar = {
                    id: newCarId,
                    name: TMSecurity.sanitize(document.getElementById('car-name').value),
                    price: TMSecurity.sanitize(document.getElementById('car-price').value),
                    year: TMSecurity.sanitize(document.getElementById('car-year').value),
                    mileage: TMSecurity.sanitize(document.getElementById('car-mileage').value),
                    images: uploadedImagesArray, // Guardamos los textos Base64 directo
                    desc: TMSecurity.sanitize(document.getElementById('car-desc').value)
                };

                try {
                    // GUARDAR EN REALTIME DATABASE
                    await database.ref("inventory/" + newCarId).set(newCar);
                    
                    resetForm();
                    btnSubmit.innerText = "Guardar Vehículo";
                    btnSubmit.disabled = false;

                } catch (error) {
                    console.error("Error al guardar:", error);
                    alert("Error guardando en Realtime Database. Revisa la consola.");
                    btnSubmit.innerText = "Guardar Vehículo";
                    btnSubmit.disabled = false;
                }
            });

            window.deleteCar = async (id) => {
                if(confirm('Jefe, ¿seguro de eliminar este vehículo permanentemente?')) {
                    await database.ref("inventory/" + id).remove();
                }
            };

            window.editCar = (id) => {
                const car = cars.find(c => c.id === id);
                if(car) {
                    document.getElementById('car-id').value = car.id;
                    document.getElementById('car-name').value = car.name;
                    document.getElementById('car-price').value = car.price;
                    document.getElementById('car-year').value = car.year;
                    document.getElementById('car-mileage').value = car.mileage;
                    document.getElementById('car-desc').value = car.desc;
                    uploadedImagesArray = car.images ? [...car.images] : [];
                    renderPreviews();
                    formTitle.innerHTML = `<i class="fa-solid fa-pen mr-2"></i>Editando Vehículo`;
                    btnCancel.classList.remove('hidden');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            const resetForm = () => {
                form.reset();
                document.getElementById('car-id').value = '';
                uploadedImagesArray = [];
                renderPreviews();
                formTitle.innerHTML = `<i class="fa-solid fa-plus mr-2"></i>Publicar Vehículo`;
                btnCancel.classList.add('hidden');
            };

            btnCancel.addEventListener('click', resetForm);
        });
    </script>
</body>
</html>
