<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colección Completa | Tito Autos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold-primary: #D4AF37; --bg-dark: #0a0a0a; --card-bg: #111111; }
        body { background-color: var(--bg-dark); color: #ffffff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .font-serif-luxury { font-family: 'Cinzel', serif; }
        .text-gradient-gold { background: linear-gradient(to bottom right, #FFE066, #D4AF37, #B8860B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-gold-solid { background: linear-gradient(to right, #B8860B, #D4AF37); color: #000; transition: all 0.4s ease; border: 1px solid #FFE066; }
        .btn-gold-solid:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        .ornate-card { background-color: var(--card-bg); border: 1px solid rgba(212, 175, 55, 0.15); position: relative; padding: 12px; transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer; }
        .ornate-card::before, .ornate-card::after { content: ''; position: absolute; width: 25px; height: 25px; border: 1px solid var(--gold-primary); transition: all 0.6s ease; pointer-events: none; opacity: 0.5; }
        .ornate-card::before { top: 4px; left: 4px; border-right: none; border-bottom: none; }
        .ornate-card::after { bottom: 4px; right: 4px; border-left: none; border-top: none; }
        .ornate-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 20px rgba(212,175,55,0.25); border-color: rgba(212, 175, 55, 0.6); }
        .ornate-card:hover::before { top: 0; left: 0; opacity: 1; }
        .ornate-card:hover::after { bottom: 0; right: 0; opacity: 1; }
        .img-container { width: 100%; height: 200px; overflow: hidden; background: #000; position: relative; border-radius: 2px;}
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 1s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .ornate-card:hover .img-container img { transform: scale(1.15); }
        .nav-link { position: relative; display: inline-block; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 1px; bottom: -2px; left: 0; background-color: var(--gold-primary); transition: width 0.3s ease; }
        .nav-link:hover::after { width: 100%; }
        .nav-separator { color: rgba(255,255,255,0.2); margin: 0 12px; font-weight: 300; }
        .modal-active { overflow: hidden; }
        #tm-modal { backdrop-filter: blur(8px); }
        
        /* Estilos del Filtro */
        .filter-select { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; outline: none; transition: all 0.3s; cursor: pointer; }
        .filter-select:focus { border-color: var(--gold-primary); }
    </style>
</head>
<body class="antialiased selection:bg-yellow-600 selection:text-black pb-16 md:pb-0">

    <nav class="fixed w-full z-50 bg-[#050505]/95 backdrop-blur-sm border-b border-white/5 py-3 px-6 md:px-8 flex justify-between items-center transition-all duration-300" id="navbar">
        <a href="index.html" class="flex items-center gap-2 md:gap-3 cursor-pointer">
            <svg class="w-6 h-6 md:w-8 md:h-8 text-[#D4AF37]" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L9 7l-5-2 3 5-6 4 7 1 2 6 2-6 7-1-6-4 3-5-5 2-3-5z"/></svg>
            <span class="font-serif-luxury text-lg md:text-xl tracking-[0.2em] text-gradient-gold font-bold">TITO AUTOS</span>
        </a>
        <div class="hidden md:flex items-center text-[10px] font-bold tracking-[0.15em] text-gray-300">
            <a href="index.html" class="nav-link hover:text-white">INICIO</a> <span class="nav-separator">|</span>
            <a href="autos.html" class="nav-link text-white">COMPRA O AUTOS</a> <span class="nav-separator">|</span>
            <a href="contacto.html" class="nav-link hover:text-white">CONTACTO</a>
        </div>
        <div class="flex items-center text-[#D4AF37] text-sm tracking-widest uppercase font-bold">
            Catálogo VIP
        </div>
    </nav>

    <div class="h-24 w-full bg-[#050505]"></div>

    <section class="py-16 px-6 md:px-12 min-h-screen">
        <div class="max-w-[1600px] mx-auto">
            <div class="text-center mb-10">
                <h1 class="font-serif-luxury text-3xl md:text-5xl tracking-[0.3em] text-gradient-gold uppercase">Inventario Total</h1>
                <div class="w-16 h-[1px] bg-[#D4AF37] mx-auto mt-6"></div>
            </div>

            <div class="bg-[#111]/80 backdrop-blur-md border border-[#D4AF37]/30 p-4 md:p-6 mb-12 rounded-sm shadow-2xl z-20 relative flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <input type="text" id="filter-search" onkeyup="applyFilters()" placeholder="Buscar modelo o palabra clave..." class="w-full bg-[#050505] border border-white/10 text-white text-xs tracking-widest px-4 py-3 focus:border-[#D4AF37] outline-none transition-all">
                    <i class="fa-solid fa-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-[#D4AF37]"></i>
                </div>
                <div class="flex flex-wrap md:flex-nowrap gap-4">
                    <select id="filter-brand" onchange="applyFilters()" class="filter-select flex-1 md:w-48">
                        <option value="">Todas las Marcas</option>
                        </select>
                    <select id="filter-year" onchange="applyFilters()" class="filter-select flex-1 md:w-40">
                        <option value="">Todos los Años</option>
                        </select>
                    <select id="filter-transmission" onchange="applyFilters()" class="filter-select flex-1 md:w-40">
                        <option value="">Transmisión</option>
                        <option value="Automático">Automático</option>
                        <option value="Manual">Manual</option>
                    </select>
                </div>
            </div>

            <div id="frontend-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </div>
    </section>

    <div id="tm-modal" class="fixed inset-0 z-[100] hidden items-center justify-center opacity-0 transition-opacity duration-500">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="closeCarModal()"></div>
        <div class="relative w-11/12 max-w-5xl bg-[#0a0a0a] border border-[#D4AF37]/50 p-1 transform scale-95 transition-transform duration-500 shadow-[0_0_50px_rgba(212,175,55,0.15)] flex flex-col md:flex-row h-[90vh] md:h-[600px]" id="tm-modal-content">
            <button onclick="closeCarModal()" class="absolute top-2 right-2 md:top-4 md:right-4 z-20 w-8 h-8 md:w-10 md:h-10 bg-black/80 rounded-full text-white border border-[#D4AF37]/50 hover:bg-[#D4AF37] hover:text-black transition-all flex items-center justify-center group">
                <i class="fa-solid fa-xmark group-hover:rotate-90 transition-transform duration-300"></i>
            </button>
            <div class="w-full md:w-1/2 h-64 md:h-full bg-[#050505] relative overflow-hidden group flex items-center justify-center p-4">
                <img id="modal-img" src="" alt="Auto" class="max-w-full max-h-full object-contain transition-transform duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent md:bg-gradient-to-r md:from-transparent md:to-[#0a0a0a] pointer-events-none"></div>
                <button onclick="prevImg(event)" id="btn-prev-img" class="absolute left-2 md:left-4 top-1/2 transform -translate-y-1/2 w-8 h-8 md:w-10 md:h-10 bg-black/60 border border-[#D4AF37]/50 rounded-full text-[#D4AF37] flex items-center justify-center hover:bg-[#D4AF37] hover:text-black transition-all hidden z-10"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="nextImg(event)" id="btn-next-img" class="absolute right-2 md:right-4 top-1/2 transform -translate-y-1/2 w-8 h-8 md:w-10 md:h-10 bg-black/60 border border-[#D4AF37]/50 rounded-full text-[#D4AF37] flex items-center justify-center hover:bg-[#D4AF37] hover:text-black transition-all hidden z-10"><i class="fa-solid fa-chevron-right"></i></button>
                <div id="img-counter" class="absolute top-2 left-2 md:top-4 md:left-4 bg-black/60 backdrop-blur-md px-3 py-1 text-[9px] md:text-[10px] font-bold text-white border border-white/20 tracking-widest hidden z-10">1 / 1</div>
            </div>
            <div class="w-full md:w-1/2 p-6 md:p-12 flex flex-col justify-between overflow-y-auto bg-[#0a0a0a] relative">
                <div>
                    <div class="flex items-center gap-3 mb-2">
                        <span id="modal-brand-badge" class="bg-white/10 text-[#D4AF37] text-[9px] px-2 py-1 font-bold uppercase tracking-widest border border-[#D4AF37]/30">MARCA</span>
                    </div>
                    <h2 id="modal-title" class="font-serif-luxury text-2xl md:text-4xl text-white mb-4 md:mb-6 leading-tight">Vehículo</h2>
                    <div class="grid grid-cols-3 gap-2 md:gap-3 mb-6 md:mb-8">
                        <div class="border border-white/5 bg-white/5 p-3 relative overflow-hidden text-center">
                            <i class="fa-regular fa-calendar text-[#D4AF37] mb-1"></i>
                            <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1">Año</p>
                            <p id="modal-year" class="text-sm text-white font-serif-luxury tracking-wider">2024</p>
                        </div>
                        <div class="border border-white/5 bg-white/5 p-3 relative overflow-hidden text-center">
                            <i class="fa-solid fa-gauge-high text-[#D4AF37] mb-1"></i>
                            <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1">Millas</p>
                            <p id="modal-mileage" class="text-sm text-white font-serif-luxury tracking-wider">0</p>
                        </div>
                        <div class="border border-white/5 bg-white/5 p-3 relative overflow-hidden text-center">
                            <i class="fa-solid fa-gears text-[#D4AF37] mb-1"></i>
                            <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1">Caja</p>
                            <p id="modal-transmission" class="text-[10px] md:text-xs text-white font-serif-luxury tracking-wider mt-1">Auto</p>
                        </div>
                    </div>
                    <div class="mb-6 md:mb-8">
                        <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-3 border-b border-white/10 pb-2">Descripción del Vehículo</p>
                        <p id="modal-desc" class="text-xs text-gray-300 font-light leading-relaxed">Descripción detallada.</p>
                    </div>
                </div>
                <div class="mt-auto pt-4 border-t border-white/10">
                    <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Inversión Requerida</p>
                    <p id="modal-price" class="text-gradient-gold font-serif-luxury text-2xl md:text-4xl font-bold mb-4">$0</p>
                    
                    <button id="btn-whatsapp" class="w-full bg-[#25D366]/10 border border-[#25D366] text-[#25D366] hover:bg-[#25D366] hover:text-white transition-all py-4 text-[10px] md:text-[11px] font-bold tracking-[0.2em] uppercase rounded-sm flex items-center justify-center gap-3">
                        <i class="fa-brands fa-whatsapp text-lg"></i> Solicitar por WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-[#050505]/95 backdrop-blur-md border-t border-[#D4AF37]/30 py-3 px-6 flex justify-around items-center md:hidden z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.8)]">
        <a href="index.html" class="flex flex-col items-center text-gray-500 hover:text-[#D4AF37] transition-colors"><i class="fa-solid fa-house mb-1 text-lg"></i><span class="text-[8px] tracking-widest font-bold">INICIO</span></a>
        <a href="autos.html" class="flex flex-col items-center text-[#D4AF37]"><i class="fa-solid fa-car mb-1 text-lg"></i><span class="text-[8px] tracking-widest font-bold">AUTOS</span></a>
        <a href="contacto.html" class="flex flex-col items-center text-gray-500 hover:text-[#D4AF37] transition-colors"><i class="fa-solid fa-phone mb-1 text-lg"></i><span class="text-[8px] tracking-widest font-bold">CONTACTO</span></a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBKVeFj-lNRMMk_BmtKne927K7ID2itPxs",
            authDomain: "titoautos-b6ad8.firebaseapp.com",
            databaseURL: "https://titoautos-b6ad8-default-rtdb.firebaseio.com",
            projectId: "titoautos-b6ad8",
            storageBucket: "titoautos-b6ad8.firebasestorage.app",
            messagingSenderId: "97866292185",
            appId: "1:97866292185:web:cf738daf745388df7fd7c8"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database(); 

        let carsDatabase = [];
        let currentCarImages = [];
        let currentImgIndex = 0;

        document.addEventListener("DOMContentLoaded", () => {
            database.ref("inventory").on("value", (snapshot) => {
                carsDatabase = [];
                snapshot.forEach((childSnapshot) => {
                    carsDatabase.push(childSnapshot.val());
                });
                populateFilters();
                renderFrontendCars(carsDatabase);
                
                // Si viene búsqueda de la otra página
                const params = new URLSearchParams(window.location.search);
                const query = params.get('q');
                if(query) {
                    document.getElementById('filter-search').value = query;
                    applyFilters();
                }
            });
        });

        // LLENAR SELECTORES DE FILTROS DINÁMICAMENTE
        function populateFilters() {
            const brandSelect = document.getElementById('filter-brand');
            const yearSelect = document.getElementById('filter-year');
            
            const uniqueBrands = [...new Set(carsDatabase.map(c => c.brand).filter(Boolean))].sort();
            const uniqueYears = [...new Set(carsDatabase.map(c => c.year).filter(Boolean))].sort((a,b) => b - a);
            
            brandSelect.innerHTML = '<option value="">Todas las Marcas</option>';
            uniqueBrands.forEach(b => brandSelect.innerHTML += `<option value="${b}">${b}</option>`);
            
            yearSelect.innerHTML = '<option value="">Todos los Años</option>';
            uniqueYears.forEach(y => yearSelect.innerHTML += `<option value="${y}">${y}</option>`);
        }

        // FUNCIÓN MAESTRA DE FILTROS
        window.applyFilters = () => {
            const searchText = document.getElementById('filter-search').value.toLowerCase();
            const brandVal = document.getElementById('filter-brand').value;
            const yearVal = document.getElementById('filter-year').value;
            const transVal = document.getElementById('filter-transmission').value;

            const filteredData = carsDatabase.filter(car => {
                const matchSearch = (car.name || '').toLowerCase().includes(searchText) || (car.brand || '').toLowerCase().includes(searchText);
                const matchBrand = brandVal === "" || car.brand === brandVal;
                const matchYear = yearVal === "" || car.year === yearVal;
                const matchTrans = transVal === "" || car.transmission === transVal;
                return matchSearch && matchBrand && matchYear && matchTrans;
            });

            renderFrontendCars(filteredData);
        };

        function renderFrontendCars(dataToRender) {
            const grid = document.getElementById('frontend-grid');
            grid.innerHTML = '';
            
            if(dataToRender.length === 0) {
                grid.innerHTML = `<p class="text-gray-500 col-span-4 text-center py-10 tracking-widest text-sm uppercase">No se encontraron vehículos con esos filtros.</p>`;
                return;
            }

            dataToRender.forEach((car) => {
                const mainImg = (car.images && car.images.length > 0) ? car.images[0] : '';
                const brandLabel = car.brand ? `<div class="absolute top-2 right-2 bg-black/80 backdrop-blur-md border border-[#D4AF37]/50 text-[#D4AF37] px-2 py-1 text-[8px] tracking-[0.2em] font-bold uppercase z-10 shadow-lg">${car.brand}</div>` : '';
                const transLabel = car.transmission || 'N/A';

                const card = document.createElement('div');
                card.className = 'ornate-card cursor-pointer group flex flex-col';
                card.onclick = () => openCarModal(car.id);
                
                card.innerHTML = `
                    <div class="img-container relative bg-[#000] flex-shrink-0">
                        <img src="${mainImg}" alt="${car.name}">
                        ${brandLabel}
                        <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent opacity-80 group-hover:opacity-40 transition-opacity duration-500"></div>
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-500 hidden md:flex">
                            <span class="bg-black/60 backdrop-blur-md border border-[#D4AF37] text-[#D4AF37] text-[10px] font-bold uppercase tracking-[0.3em] px-6 py-3 shadow-[0_0_20px_rgba(212,175,55,0.4)] transform scale-90 group-hover:scale-100 transition-transform duration-500">Ver Detalles</span>
                        </div>
                    </div>
                    <div class="px-4 py-5 flex flex-col flex-grow bg-gradient-to-b from-[#111] to-[#0a0a0a] border-t border-white/5 relative overflow-hidden">
                        <h3 class="font-serif-luxury text-base font-bold tracking-wide mb-2 text-white truncate group-hover:text-gradient-gold transition-all">${car.name}</h3>
                        <div class="w-8 group-hover:w-full h-[2px] bg-[#D4AF37] transition-all duration-700 ease-out mb-3"></div>
                        
                        <div class="flex gap-3 mb-4">
                            <span class="text-[9px] text-gray-400 tracking-widest font-light flex items-center gap-1"><i class="fa-regular fa-calendar text-[#D4AF37]"></i> ${car.year}</span>
                            <span class="text-[9px] text-gray-400 tracking-widest font-light flex items-center gap-1"><i class="fa-solid fa-gauge-high text-[#D4AF37]"></i> ${car.mileage}</span>
                            <span class="text-[9px] text-gray-400 tracking-widest font-light flex items-center gap-1"><i class="fa-solid fa-gears text-[#D4AF37]"></i> ${transLabel}</span>
                        </div>
                        
                        <div class="flex justify-between items-end border-t border-white/10 pt-4 mt-auto">
                            <div>
                                <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1">Precio</p>
                                <p class="text-[#D4AF37] font-semibold text-base tracking-wide">$${car.price}</p>
                            </div>
                            <span class="text-[9px] text-white group-hover:text-[#D4AF37] tracking-[0.2em] uppercase transition-colors"><i class="fa-solid fa-arrow-right"></i></span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // LÓGICA DEL MODAL
        function updateModalImage() {
            if(currentCarImages && currentCarImages.length > 0) {
                document.getElementById('modal-img').src = currentCarImages[currentImgIndex];
                document.getElementById('img-counter').innerText = `${currentImgIndex + 1} / ${currentCarImages.length}`;
            }
        }
        window.prevImg = (e) => { e.stopPropagation(); currentImgIndex = (currentImgIndex - 1 + currentCarImages.length) % currentCarImages.length; updateModalImage(); };
        window.nextImg = (e) => { e.stopPropagation(); currentImgIndex = (currentImgIndex + 1) % currentCarImages.length; updateModalImage(); };

        function openCarModal(carId) {
            const data = carsDatabase.find(c => c.id === carId);
            if(!data) return;

            currentCarImages = data.images && data.images.length > 0 ? data.images : [];
            currentImgIndex = 0;
            updateModalImage();

            const btnPrev = document.getElementById('btn-prev-img');
            const btnNext = document.getElementById('btn-next-img');
            const counter = document.getElementById('img-counter');

            if(currentCarImages.length > 1) {
                btnPrev.classList.remove('hidden'); btnNext.classList.remove('hidden'); counter.classList.remove('hidden');
            } else {
                btnPrev.classList.add('hidden'); btnNext.classList.add('hidden'); counter.classList.add('hidden');
            }

            document.getElementById('modal-brand-badge').innerText = data.brand || 'EXCLUSIVO';
            document.getElementById('modal-title').innerText = data.name;
            document.getElementById('modal-year').innerText = data.year;
            document.getElementById('modal-mileage').innerText = data.mileage;
            document.getElementById('modal-transmission').innerText = data.transmission || 'N/A';
            document.getElementById('modal-price').innerText = "$" + data.price;
            document.getElementById('modal-desc').innerText = data.desc;
            
            // WHATSAPP LINK MÁGICO
            const btnWpp = document.getElementById('btn-whatsapp');
            const phone = "573163762634";
            const message = `Hola Tito Autos, estoy muy interesado en adquirir el vehículo VIP: ${data.brand || ''} ${data.name} valorado en $${data.price}. ¿Podemos agendar una cita?`;
            btnWpp.onclick = () => {
                window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(message)}`, '_blank');
            };
            
            const modal = document.getElementById('tm-modal');
            const modalContent = document.getElementById('tm-modal-content');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.classList.add('modal-active');
            setTimeout(() => { modal.classList.remove('opacity-0'); modalContent.classList.remove('scale-95'); modalContent.classList.add('scale-100'); }, 10);
        }

        function closeCarModal() {
            const modal = document.getElementById('tm-modal');
            const modalContent = document.getElementById('tm-modal-content');
            modal.classList.add('opacity-0'); modalContent.classList.remove('scale-100'); modalContent.classList.add('scale-95');
            setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); document.body.classList.remove('modal-active'); }, 500);
        }
    </script>
</body>
</html>
